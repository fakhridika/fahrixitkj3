<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahri Andhika XI TKJ 3 | Peaky Blinders</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: rgba(0, 150, 255, 0.6);
            --card-bg: rgba(255, 255, 255, 0.08);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            /* Background dengan overlay agar teks tetap terbaca */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('back.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            overflow-x: hidden;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #81d4fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 300;
        }

        /* Container Utama Grid */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            animation: fadeInUp 1s ease-out;
        }

        /* Desain Kartu Glassmorphism */
        .card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-content {
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            text-transform: capitalize;
        }

        /* Animasi */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsif Mobile */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .container {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .card img { height: 180px; }
        }

        @media (max-width: 480px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Peaky Blinders</h1>
        <p class="subtitle">Fahri Andika • XI TKJ 3 • Project Web 2026</p>
    </header>

    <main class="container">
        <a href="thomas.html" class="card">
            <img src="thomas.jpeg" alt="Thomas Shelby">
            <div class="card-content">
                <span class="card-name">Thomas Shelby</span>
            </div>
        </a>

        <a href="arthur.html" class="card">
            <img src="arthur.jpeg" alt="Arthur Shelby">
            <div class="card-content">
                <span class="card-name">Arthur Shelby</span>
            </div>
        </a>

        <a href="pollygray.html" class="card">
            <img src="polly.jpeg" alt="Pollygray">
            <div class="card-content">
                <span class="card-name">Pollygray</span>
            </div>
        </a>

        <a href="john.html" class="card">
            <img src="john.jpeg" alt="John shelby">
            <div class="card-content">
                <span class="card-name">John Shelby</span>
            </div>
        </a>
    </main>

</body>
</html>
